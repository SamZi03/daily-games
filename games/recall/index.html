<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricLock - Streaks</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link rel="stylesheet" href="../../css/style.css?v=3">
</head>
<body class="game-page">

    <header class="game-header">
        <a href="../../index.html" class="back-btn">← Back</a>
        <h2>💡 LyricLock</h2>
    </header>

    <div class="game-container">
        <h1 class="game-big-title">LyricLock</h1>
        <p class="game-subtitle">Guess the song from the clues</p>

        <div class="recall-clues" id="cluesSection"></div>

        <div class="attempts-display" id="attemptsDisplay"></div>
        <div class="guesses-list" id="guessesList"></div>

        <div id="inputSection">
            <div class="guess-input-wrap">
                <input type="text" class="guess-input" id="guessInput"
                    placeholder="Type a song name..." autocomplete="off">
            </div>
            <div class="autocomplete-dropdown" id="autocomplete"></div>
            <div class="action-buttons">
                <button class="btn btn-skip" id="skipBtn">Skip</button>
                <button class="btn btn-primary" id="submitBtn">Submit</button>
            </div>
        </div>

        <div class="result-box" id="resultBox" style="display:none;"></div>
    </div>

    <script src="../../js/app.js?v=2"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="game.js"></script>
</body>
</html>
