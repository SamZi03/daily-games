<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">Streaks</h1>
            <div class="streak-display">
                <div class="streak-icon">🔥</div>
                <div>
                    <div class="streak-number" id="streakCount">0</div>
                    <div class="streak-label">day streak</div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <p class="home-date" id="todayDate"></p>
        <div class="games-grid" id="gamesGrid"></div>
    </main>

    <div class="ad-banner-wrap">
        <div class="ad-placeholder">Advertisement</div>
    </div>

    <footer class="site-footer">
        <p>New games every day at midnight</p>
        <button onclick="resetForTesting()" class="reset-btn">🔄 Reset All Games (Testing)</button>
    </footer>

    <script src="js/app.js?v=2"></script>
    <script src="js/sidebar.js"></script>
</body>
</html>
